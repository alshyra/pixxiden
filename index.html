<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/pixxiden.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixxiden</title>

    <!-- Google Fonts: non-blocking load to avoid render delay -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />

      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" />

    <style>
      /* Global minimal */
      html,
      body {
        background-color: #0a0a0b;
        margin: 0;

      body.splash {
        background-color: transparent;

      #app {

        height: 100%;
        transition: opacity 300ms ease-in;
      }

  </head>
  <body>

    <div id="app"></div>
